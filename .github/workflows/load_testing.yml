name: Load Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Generate Load Testing Report
      run: python generate_load_test_report.py

    - name: Upload Load Testing Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Load_Testing_Report
        path: Load_Testing.xlsx
